<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h1>Edit Task</h1>

        <!-- Form to edit task -->
        <form action="{{ url_for('edit_task', task_id=task.id) }}" method="POST" class="task-form">
            <input type="text" name="title" value="{{ task.title }}" placeholder="Enter task title" required>
            <textarea name="description" placeholder="Enter task description" rows="4" required>{{ task.description }}</textarea>
            <div class="date-picker-container">
                <input type="date" name="start_date" value="{{ task.start_date }}" required>
                <input type="date" name="end_date" value="{{ task.end_date }}" required>
            </div>
            <div class="button-container">
                <button type="submit" class="btn-update">Update Task</button>
                <a href="{{ url_for('index') }}" class="btn-back">Go Back</a>
            </div>
        </form>
    </div>
</body>
</html>
